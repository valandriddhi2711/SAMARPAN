{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Service</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: Inter, sans-serif;
      background: #f4f7fe;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: 50px auto;
      padding: 40px 20px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }

    h2 {
      text-align: center;
      color: #2563eb;
      margin-bottom: 25px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input, textarea {
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      padding: 10px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1e40af;
    }

    .message {
      margin-bottom: 15px;
      padding: 10px 15px;
      border-radius: 8px;
    }

    .success {
      background: #22c55e;
      color: #fff;
    }

    .error {
      background: #f87171;
      color: #fff;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .back-link i {
      margin-right: 6px;
    }
  </style>
</head>
<body>

<div class="container">
  <a href="{% url 'manage_services' %}" class="back-link">
    <i class="fa-solid fa-arrow-left"></i> Back to Services
  </a>

  <h2>Edit Service</h2>

  <!-- Messages -->
  {% if messages %}
    {% for msg in messages %}
      <div class="message {% if msg.tags %}{{ msg.tags }}{% endif %}">{{ msg }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Service Title" value="{{ service.title }}" required>
    <textarea name="description" placeholder="Service Description" rows="4" required>{{ service.description }}</textarea>
    <input type="text" name="icon" placeholder="FontAwesome Icon Class (optional)" value="{{ service.icon }}">
    <input type="file" name="image" accept="image/*">

    {% if service.image %}
      <p>Current Image:</p>
      <img src="{{ service.image.url }}" alt="{{ service.title }}" style="width:100%; max-height:150px; object-fit:cover; border-radius:12px; margin-bottom:10px;">
    {% endif %}

    <button type="submit">Update Service</button>
  </form>
</div>

</body>
</html>
