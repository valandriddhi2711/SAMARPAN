<!DOCTYPE html>
<html>
<head>
<title>Emergency Donor Support</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

/* Top Header */
.header{
    background:#dc3545;
    padding:25px;
    color:white;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

/* Card Design */
.form-card{
    margin-top:60px;
    border-radius:20px;
    box-shadow:0px 6px 20px rgba(0,0,0,0.15);
}

.card-header{
    background:#dc3545;
    color:white;
    text-align:center;
    font-size:22px;
    border-radius:20px 20px 0 0;
}

.btn-register{
    background:#dc3545;
    border:none;
    width:100%;
    font-size:18px;
}

.btn-register:hover{
    background:#dc3545;
}

/* back button */
.back-link{
    text-align:center;
    margin-top:25px;
}

</style>

</head>

<body>

<div class="header">
Emergency Donor Support
</div>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card form-card">

<div class="card-header">
Request Emergency Organ
</div>

<div class="card-body">

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Patient Name</label>
<input type="text" name="patient_name" class="form-control" placeholder="Enter Patient Name">
</div>

<div class="mb-3">
<label class="form-label">Required Organ</label>
<select name="organ" class="form-select">

<option>Select Organ</option>
<option>Kidney</option>
<option>Liver</option>
<option>Heart</option>
<option>Eye</option>
<option>Lung</option>
<option>Pancreas</option>

</select>
</div>

<div class="mb-3">
<label class="form-label">Blood Group</label>
<select name="blood_group" class="form-select">

<option>Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>
</div>

<div class="mb-3">
<label class="form-label">Hospital Name</label>
<input type="text" name="hospital" class="form-control" placeholder="Enter Hospital Name">
</div>

<div class="mb-3">
<label class="form-label">Contact Number</label>
<input type="text" name="contact" class="form-control" placeholder="Enter Phone Number">
</div>

<div class="mb-3">
<label class="form-label">Emergency Details</label>
<textarea name="details" class="form-control" rows="3" placeholder="Describe emergency condition"></textarea>
</div>

<button type="submit" class="btn btn-register">
Send Emergency Request
</button>

</form>

</div>
</div>

<div class="back-link">
<a href="/" class="text-success fw-bold">← Back to Home</a>
</div>

</div>
</div>
</div>

</body>
</html>
