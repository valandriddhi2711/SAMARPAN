{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Services</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: Inter, sans-serif;
      background: #f4f7fe;
      margin: 0;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #2563eb;
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }

    th, td {
      padding: 15px;
      text-align: center;
    }

    th {
      background: #2563eb;
      color: #fff;
      font-weight: 600;
    }

    tr:nth-child(even) {
      background: #f9fafb;
    }

    td i {
      font-size: 22px;
      color: #2563eb;
    }

    .actions a {
      margin: 0 5px;
      padding: 8px 10px;
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
    }

    .edit {
      background: #22c55e;
    }

    .delete {
      background: #ef4444;
    }

    .add-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 10px 16px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
    }

    .add-btn i {
      margin-right: 6px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Manage Services</h1>

    <!-- Add Service Button -->
    <a href="{% url 'add_service' %}" class="add-btn">
      <i class="fa-solid fa-plus"></i> Add New Service
    </a>

    <table>
      <thead>
        <tr>
          <th>S.NO.</th>
          <th>Icon</th>
          <th>Title</th>
          <th>Description</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        {% for s in services %}
        <tr>
          <td>{{ forloop.counter }}</td>

          <td>
            {% if s.icon %}
              <i class="{{ s.icon }}"></i>
            {% else %}
              —
            {% endif %}
          </td>

          <td>{{ s.title }}</td>

          <td>{{ s.description|truncatechars:60 }}</td>

          <td class="actions">
            <a href="{% url 'edit_service' s.id %}" class="edit">
              <i class="fa-solid fa-pen"></i>
            </a>
            <a href="{% url 'delete_service' s.id %}" class="delete"
               onclick="return confirm('Are you sure you want to delete this service?');">
              <i class="fa-solid fa-trash"></i>
            </a>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="5">No services found.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

</body>
</html>
