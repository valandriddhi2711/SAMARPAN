{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Samarpan Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 550px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            position: relative;
            background: #5b86e5;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        /* Home Button */
        .home-btn {
            position: absolute;
            left: 15px;
            top: 10px;
        }

        .home-btn img {
            width: 28px;
            height: 28px;
            cursor: pointer;
            transition: 0.3s;
        }

        .home-btn img:hover {
            transform: scale(1.2);
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f4f6fb;
        }

        .message {
            margin: 8px 0;
            padding: 10px 14px;
            border-radius: 20px;
            max-width: 75%;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user {
            background: #5b86e5;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .bot {
            background: #e4e6eb;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            background: white;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
        }

        .chat-input button {
            margin-left: 10px;
            padding: 10px 18px;
            border: none;
            border-radius: 20px;
            background: #5b86e5;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .chat-input button:hover {
            background: #36d1dc;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">
        
        <!-- Home Image Link -->
        <a href="/" class="home-btn">
            <img src="{% static 'images/homepage.avif' %}" alt="Home">
        </a>

        🤖 Samarpan Chatbot
    </div>

    <div id="chat-box" class="chat-box"></div>

    <div class="chat-input">
        <input type="text" id="message" placeholder="Type your message..."
               onkeypress="if(event.key === 'Enter'){ sendMessage(); }">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("message");
    let message = input.value.trim();
    let chatBox = document.getElementById("chat-box");

    if (message === "") return;

    chatBox.innerHTML += `<div class="message user">${message}</div>`;

    fetch(`/chatbot-response/?message=${message}`)
        .then(response => response.json())
        .then(data => {
            chatBox.innerHTML += `<div class="message bot">${data.response}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
