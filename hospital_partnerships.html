<!DOCTYPE html>
<html>
<head>
<title>Hospital Partnerships</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(to right,#c31432,#240b36);
padding:40px;
}

/* Title */

.page-title{
text-align:center;
color:white;
margin-bottom:40px;
}

/* Grid */

.hospital-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
}

/* Card */

.hospital-card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
}

.hospital-card:hover{
transform:translateY(-6px);
}

/* Hospital Name */

.hospital-name{
font-size:18px;
font-weight:600;
color:#c31432;
margin-bottom:10px;
}

/* Info */

.hospital-info{
font-size:14px;
color:#555;
margin-bottom:6px;
}

/* Service Tag */

.services{
margin-top:10px;
background:#f5f5f5;
padding:8px;
border-radius:8px;
font-size:13px;
}

/* Back Button */

.back-link{
text-align:center;
margin-top:40px;
}

.back-link a{
display:inline-block;
padding:10px 25px;
background:white;
color:#c31432;
text-decoration:none;
border-radius:25px;
font-weight:500;
}

.back-link a:hover{
background:#c31432;
color:white;
}

</style>

</head>

<body>

<h2 class="page-title">🏥 Hospital Partnerships</h2>

<div class="hospital-container">

{% for hospital in hospitals %}

<div class="hospital-card">

<div class="hospital-name">
{{ hospital.hospital_name }}
</div>

<div class="hospital-info">
📍 {{ hospital.location }}
</div>

<div class="hospital-info">
📞 {{ hospital.contact_details }}
</div>

<div class="services">
🩸 {{ hospital.supported_services }}
</div>

</div>

{% empty %}

<p style="color:white;text-align:center;">
No hospitals added yet
</p>

{% endfor %}

</div>

<div class="back-link">
<a href="{% url 'home' %}">← Back to Home</a>
</div>

</body>
</html>
