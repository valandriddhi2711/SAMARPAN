<!DOCTYPE html>
<html>
<head>
<title>Blood Donor Directory</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(to right,#c31432,#240b36);
padding:40px;
}

/* Page Title */

.page-title{
text-align:center;
color:white;
margin-bottom:40px;
}

/* Grid Layout */

.donor-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1000px;
margin:auto;
}

/* Donor Card */

.donor-card{
background:white;
border-radius:15px;
padding:25px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
}

.donor-card:hover{
transform:translateY(-6px);
}

/* Blood Group Circle */

.blood-circle{
width:65px;
height:65px;
background:#c31432;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
margin:auto;
margin-bottom:15px;
}

/* Name */

.donor-name{
font-size:18px;
font-weight:600;
margin-bottom:6px;
}

/* Info */

.donor-info{
color:#666;
font-size:14px;
margin-bottom:6px;
}

/* Call Button */

.call-btn{
display:inline-block;
margin-top:10px;
padding:8px 18px;
background:#c31432;
color:white;
text-decoration:none;
border-radius:20px;
font-size:14px;
}

.call-btn:hover{
background:#8e0e1a;
}

.no-data{
text-align:center;
color:white;
margin-top:40px;
}
.back-link{
text-align:center;
margin-top:40px;
}

.back-link a{
display:inline-block;
padding:10px 25px;
background:#ffffff;
color:#c31432;
text-decoration:none;
border-radius:25px;
font-weight:500;
transition:0.3s;
}

.back-link a:hover{
background:#c31432;
color:white;
}
</style>

</head>

<body>

<h2 class="page-title">🩸 Registered Blood Donors</h2>

<div class="donor-container">

{% for donor in donors %}

<div class="donor-card">

<div class="blood-circle">
{{ donor.blood_group }}
</div>

<div class="donor-name">
{{ donor.fullname }}
</div>

<div class="donor-info">
📍 {{ donor.city }}
</div>

<div class="donor-info">
📞 {{ donor.mobile }}
</div>

<a href="tel:{{ donor.mobile }}" class="call-btn">
Call Donor
</a>

</div>

{% empty %}

<div class="no-data">
No blood donors registered yet
</div>

{% endfor %}

</div>
<div class="back-link">
        <a href="{% url 'home' %}">← Back to Home</a>
    </div>

</body>
</html>
