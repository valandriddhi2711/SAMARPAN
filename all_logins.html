{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login As</title>

    <!-- Bootstrap 4 -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <style>
   body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: #fff;
}



        h2 {
            font-weight: 700;
            margin-bottom: 40px;
        }

        .login-card {
            width: 330px;
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
            transition: 0.3s ease;
            margin: 15px;
            text-align: center;
        }

        .login-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.18);
        }

        .login-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .login-card h4 {
            font-weight: 700;
            margin-top: 15px;
        }

        .login-card p {
            color: #6c757d;
            font-size: 15px;
            padding: 0 20px;
        }

        .btn-custom {
            border-radius: 8px;
            padding: 10px;
            font-weight: 600;
        }
    </style>
</head>

<body>

{% include 'navigation.html' %}
<hr class="mt-0">

<div class="container text-center mt-5">
    <h2>Login As a...</h2>

    <div class="d-flex justify-content-center flex-wrap">

        <!-- Donor -->
        <div class="login-card">
            <img src="{% static 'images/download.jpg' %}" alt="Donor">
            <div class="p-4">
                <h4>Donor</h4>
                <p>Donate funds and track your donations</p>
                <a href="{% url 'donor_login' %}"
                   class="btn btn-primary btn-custom btn-block">
                    Go To Donor Login
                </a>
            </div>
        </div>

        <!-- Volunteer -->
        <div class="login-card">
            <img src="{% static 'images/download1.jpg' %}" alt="Volunteer">
            <div class="p-4">
                <h4>Volunteer</h4>
                <p>Manage donation activities and requests</p>
                <a href="{% url 'volunteer_login' %}"
                   class="btn btn-success btn-custom btn-block">
                    Go To Volunteer Login
                </a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
