{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Products - Samarpan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: #f4f7f6;
            text-align: center;
        }

        h1 {
            background: #1f5c4d;
            color: white;
            padding: 30px;
            margin: 0;
        }

        .program-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 50px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 280px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card h3 {
            padding: 15px;
            margin: 0;
            color: #1f5c4d;
        }

        .back-link {
            display: inline-block;
            margin: 30px;
            text-decoration: none;
            color: #1f5c4d;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Our Donation Programs</h1>

<div class="program-container">

    <div class="card">
    <a href="{% url 'kidney_donor' %}">
        <img src="{% static 'images/Kidney Donation.webp' %}">
        <h3>Kidney Donation</h3>
    </a>
</div>

    <!-- Liver -->
    <div class="card">
        <a href="{% url 'liver-donor' %}">
            <img src="{% static 'images/liver donation.webp' %}" alt="Liver Donation">
            <h3>Liver Donation</h3>
        </a>
    </div>

    <!-- Heart -->
    <div class="card">
        <a href="{% url 'heart-donor' %}">
            <img src="{% static 'images/heart donation.jpeg' %}" alt="Heart Donation">
            <h3>Heart Donation</h3>
        </a>
    </div>

    <!-- Eye -->
    <div class="card">
        <a href="{% url 'eye-donor' %}">
            <img src="{% static 'images/Eye Donation.jpg' %}" alt="Eye Donation">
            <h3>Eye Donation</h3>
        </a>
    </div>

    <!-- Lung -->
    <div class="card">
        <a href="{% url 'lung-donor' %}">
            <img src="{% static 'images/Lung Donation.jpeg' %}" alt="Lung Donation">
            <h3>Lung Donation</h3>
        </a>
    </div>

    <!-- Intestines -->
    <!-- <div class="card">
        <a href="#">
            <img src="{% static 'images/intestine_donation.jpg' %}" alt="Intestines Donation">
            <h3>Intestines Donation</h3>
        </a>
    </div> -->

    <!-- Tissue -->
    <!-- <div class="card">
        <a href="#">
            <img src="{% static 'images/tissue_donation.jpg' %}" alt="Tissue Donation">
            <h3>Tissue Donation</h3>
        </a>
    </div> -->

    <!-- Pancreas -->
    <div class="card">
        <a href="{% url 'pancreas-donor' %}">
            <img src="{% static 'images/pancreas_donation.png' %}" alt="Pancreas Donation">
            <h3>Pancreas Donation</h3>
        </a>
    </div>

</div>

<a href="{% url 'home' %}" class="back-link">← Back to Home</a>

</body>
</html>
