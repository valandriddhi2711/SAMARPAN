<!DOCTYPE html>
<html>
<head>
    <title>Pledge Form | Samarpan Organ Donation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(to right,#eef3f8,#f9fbfd);
        }

        /* HEADER */
        .header{
            background:#1e88a8;
            color:white;
            padding:25px;
            text-align:center;
        }

        .header h1{
            font-size:32px;
            font-weight:600;
        }

        .header p{
            font-size:14px;
            opacity:0.9;
        }

        /* FORM CONTAINER */
        .container{
            max-width:1200px;
            margin:40px auto;
            background:white;
            padding:50px;
            border-radius:15px;
            box-shadow:0 10px 40px rgba(0,0,0,0.08);
        }

        h2{
            margin-bottom:35px;
            color:#1e88a8;
            font-weight:600;
        }

        .section-title{
            margin:40px 0 20px;
            font-weight:600;
            color:#333;
            border-left:4px solid #1e88a8;
            padding-left:10px;
        }

        .form-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
        }

        .form-group{
            position:relative;
        }

        .form-group input,
        .form-group select,
        .form-group textarea{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            transition:0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus{
            border-color:#1e88a8;
            box-shadow:0 0 5px rgba(30,136,168,0.2);
        }

        .full{
            grid-column:1/-1;
        }

        /* Checkbox Styling */
        .checkbox-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:10px;
            margin-top:10px;
        }

        .checkbox-grid label{
            background:#f5f9fc;
            padding:8px 12px;
            border-radius:8px;
            cursor:pointer;
            border:1px solid #dce6ef;
            transition:0.3s;
        }

        .checkbox-grid label:hover{
            background:#e3f2f7;
        }

        .declaration{
            margin-top:30px;
            padding:20px;
            background:#f9fbfd;
            border-radius:10px;
            border:1px solid #e1e8ef;
        }

        .submit-area{
            margin-top:30px;
            text-align:center;
        }

        .submit-area button{
            padding:14px 50px;
            border:none;
            border-radius:40px;
            font-size:16px;
            background:#1e88a8;
            color:white;
            cursor:pointer;
            transition:0.3s;
        }

        .submit-area button:hover{
            background:#156a82;
            transform:translateY(-2px);
        }

        .note{
            margin-top:15px;
            color:green;
            font-size:14px;
            text-align:center;
        }

        footer{
            margin-top:60px;
            background:#1e3d59;
            color:white;
            padding:25px;
            text-align:center;
            font-size:14px;
        }

    </style>
</head>
<body>

<div class="header">
    <h1>Organ Donation Pledge Form</h1>
    <p>A Few Minutes of Your Time May Mean A Lifetime For Another</p>
</div>

<div class="container">
<form method="POST">
{% csrf_token %}

<h2>Personal Details</h2>

<div class="form-grid">
    <div class="form-group">
        <input type="text" name="first_name" placeholder="First Name *" required>
    </div>

    <div class="form-group">
        <input type="text" name="middle_name" placeholder="Middle Name">
    </div>

    <div class="form-group">
        <input type="text" name="last_name" placeholder="Last Name *" required>
    </div>

    <div class="form-group full">
        <input type="text" name="parent_name" placeholder="Mother's / Father's Name *" required>
    </div>

    <div class="form-group full">
        <textarea name="address" rows="2" placeholder="Current Residential Address *" required></textarea>
    </div>

    <div class="form-group">
        <input type="text" name="city" placeholder="City *" required>
    </div>

    <div class="form-group">
        <input type="text" name="district" placeholder="District *" required>
    </div>

    <div class="form-group">
        <input type="text" name="state" placeholder="State *" required>
    </div>

    <div class="form-group">
        <input type="text" name="pin" placeholder="PIN Code *" required>
    </div>

    <div class="form-group">
        <input type="text" name="mobile" placeholder="Mobile Number *" required>
    </div>

    <div class="form-group">
        <input type="email" name="email" placeholder="Email *" required>
    </div>

    <div class="form-group">
        <input type="date" name="dob" required>
    </div>

    <div class="form-group">
        <select name="gender" required>
            <option value="">Select Gender *</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
    </div>

    <div class="form-group">
        <select name="blood_group" required>
            <option value="">Select Blood Group *</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>O+</option>
            <option>O-</option>
            <option>AB+</option>
            <option>AB-</option>
        </select>
    </div>
</div>

<h3 class="section-title">Organs I Wish to Donate</h3>

<div class="checkbox-grid">
    <label><input type="checkbox" name="organs" value="Corneas"> Corneas (Eyes)</label>
    <label><input type="checkbox" name="organs" value="Kidneys"> Kidneys</label>
    <label><input type="checkbox" name="organs" value="Heart"> Heart</label>
    <label><input type="checkbox" name="organs" value="Lungs"> Lungs</label>
    <label><input type="checkbox" name="organs" value="Liver"> Liver</label>
    <label><input type="checkbox" name="organs" value="Pancreas"> Pancreas</label>
    <label><input type="checkbox" name="organs" value="Skin"> Skin</label>
    <label><input type="checkbox" name="organs" value="All"> All Organs</label>
</div>

<div class="declaration">
    <label>
        <input type="checkbox" required>
        I declare that I am a citizen of India and above 18 years of age.
    </label>
    <br><br>
    <label>
        <input type="checkbox" required>
        I agree to the privacy policy.
    </label>
</div>

<div class="note">
    Please ensure your email address is correct to receive your donor card.
</div>

<div class="submit-area">
    <button type="submit">Submit Pledge</button>
</div>

</form>
</div>

<footer>
© 2026 Samarpan Organ Donation Awareness Initiative
</footer>

</body>
</html>
