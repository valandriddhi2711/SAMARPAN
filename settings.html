{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>User Settings - SAMARPAN</title>
  <link rel="stylesheet" href="{% static 'css/mystyle.css' %}">
  <link rel="icon" href="{% static 'images/donation.jpg' %}">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- jQuery and Bootstrap Bundle -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      background-color: #f8f9fa;
    }

    .settings-container {
      max-width: 900px;
      margin: 50px auto;
      background-color: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .settings-header {
      margin-bottom: 30px;
      text-align: center;
    }

    .settings-header h2 {
      font-weight: bold;
      color: #dc3545;
    }

    .form-group label {
      font-weight: 600;
    }

    .btn-save {
      background-color: #dc3545;
      color: white;
    }
    .btn-save:hover {
      background-color: #c82333;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="#">
      <img src="{% static 'images/donation.jpg' %}" width="45" height="45" alt="Samarpan Logo" class="mr-2">
      <span class="brand-text">Samarpan</span>
    </a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#myMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="myMenu">
      <ul class="navbar-nav text-center">
        <li class="nav-item"><a class="nav-link" href="/dashboard/">Dashboard</a></li>
        <li class="nav-item active"><a class="nav-link" href="/settings/">Settings</a></li>
        <li class="nav-item"><a class="nav-link" href="/logout/">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Settings Page -->
<div class="settings-container">
  <div class="settings-header">
    <h2>User Settings</h2>
    <p>Update your account preferences below</p>
  </div>

  <form method="POST" action="{% url 'update_settings' %}">
    {% csrf_token %}
    
    <!-- Account Info -->
    <h5 class="mb-3">Account Information</h5>
    <div class="form-row">
      <div class="form-group col-md-6">
        <label for="username">Username</label>
        <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}">
      </div>
      <div class="form-group col-md-6">
        <label for="email">Email</label>
        <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}">
      </div>
    </div>

    <!-- Password -->
    <h5 class="mb-3 mt-4">Change Password</h5>
    <div class="form-row">
      <div class="form-group col-md-6">
        <label for="password">New Password</label>
        <input type="password" class="form-control" id="password" name="password">
      </div>
      <div class="form-group col-md-6">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" class="form-control" id="confirm_password" name="confirm_password">
      </div>
    </div>

    <!-- Preferences -->
    <h5 class="mb-3 mt-4">Preferences</h5>
    <div class="form-group">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="email_notifications" name="email_notifications" {% if user.profile.email_notifications %}checked{% endif %}>
        <label class="form-check-label" for="email_notifications">Receive Email Notifications</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="dark_mode" name="dark_mode" {% if user.profile.dark_mode %}checked{% endif %}>
        <label class="form-check-label" for="dark_mode">Enable Dark Mode</label>
      </div>
    </div>

    <!-- Save Button -->
    <div class="text-center mt-4">
      <button type="submit" class="btn btn-save btn-lg">Save Changes</button>
    </div>
  </form>
</div>

<!-- Footer -->
<footer class="text-center p-3 bg-dark text-white mt-5">
  © 2026 SAMARPAN
</footer>

</body>
</html>
