<!DOCTYPE html>
<html>
<head>
<title>Emergency Alert</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background: linear-gradient(135deg,#ff4e50,#f9d423);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family: Arial, Helvetica, sans-serif;
}

.card{
border:none;
border-radius:15px;
}

.card-header{
border-radius:15px 15px 0 0;
font-weight:600;
}

.form-control{
border-radius:8px;
}

.btn-danger{
border-radius:8px;
font-weight:600;
}

.icon{
margin-right:8px;
color:#dc3545;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow-lg">

<div class="card-header bg-danger text-white text-center">
<h3><i class="fa-solid fa-triangle-exclamation"></i> Emergency Alert</h3>
<p class="mb-0">Submit urgent organ request</p>
</div>

<div class="card-body p-4">

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label class="form-label"><i class="fa-solid fa-user icon"></i>Patient Name</label>
<input type="text" name="patient_name" class="form-control" placeholder="Enter patient name" required>
</div>

<div class="mb-3">
<label class="form-label"><i class="fa-solid fa-heart-pulse icon"></i>Organ Needed</label>
<select name="organ_needed" class="form-control" required>
<option value="">Select Organ</option>
<option value="Kidney">Kidney</option>
<option value="Liver">Liver</option>
<option value="Heart">Heart</option>
<option value="Lung">Lung</option>
<option value="Pancreas">Pancreas</option>
<option value="Eye">Eye</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">
<i class="fa-solid fa-hospital icon"></i>Hospital Name
</label>

<select name="hospital" class="form-control">
    <option value="">Select Hospital</option>

    <option value="Civil Hospital Ahmedabad">Civil Hospital Ahmedabad</option>
    <option value="Apollo Hospital Ahmedabad">Apollo Hospital Ahmedabad</option>
    <option value="Sterling Hospital Ahmedabad">Sterling Hospital Ahmedabad</option>
    <option value="Shalby Hospital Ahmedabad">Shalby Hospital Ahmedabad</option>
    <option value="Zydus Hospital Ahmedabad">Zydus Hospital Ahmedabad</option>

    <option value="SSG Hospital Vadodara">SSG Hospital Vadodara</option>
    <option value="Sterling Hospital Vadodara">Sterling Hospital Vadodara</option>
    <option value="Bhailal Amin General Hospital Vadodara">Bhailal Amin General Hospital Vadodara</option>

    <option value="New Civil Hospital Surat">New Civil Hospital Surat</option>
    <option value="Kiran Hospital Surat">Kiran Hospital Surat</option>

    <option value="Civil Hospital Rajkot">Civil Hospital Rajkot</option>
    <option value="Wockhardt Hospital Rajkot">Wockhardt Hospital Rajkot</option>

</select>
</div>

<div class="mb-3">
<label class="form-label">
<i class="fa-solid fa-location-dot icon"></i>Location
</label>

<select name="location" class="form-control">
    <option value="">Select Location</option>

    <option value="Ahmedabad">Ahmedabad</option>
    <option value="Vadodara">Vadodara</option>
    <option value="Anand">Anand</option>
    <option value="Changa">Changa</option>
    <option value="Surat">Surat</option>
    <option value="Rajkot">Rajkot</option>
    <option value="Gandhinagar">Gandhinagar</option>
    <option value="Anand">Anand</option>
    <option value="Bharuch">Bharuch</option>
    <option value="Bhavnagar">Bhavnagar</option>
    <option value="Jamnagar">Jamnagar</option>
    <option value="Junagadh">Junagadh</option>
    <option value="Mehsana">Mehsana</option>
    <option value="Morbi">Morbi</option>
    <option value="Navsari">Navsari</option>
    <option value="Patan">Patan</option>
    <option value="Valsad">Valsad</option>
</select>

</div>

<div class="mb-3">
<label class="form-label"><i class="fa-solid fa-location-dot icon"></i>Location</label>
<textarea name="location" class="form-control" rows="3" placeholder="Enter your location"></textarea>
</div>

<div class="mb-3">
<label class="form-label"><i class="fa-solid fa-phone icon"></i>Contact Number</label>
<input type="text" name="contact_number" class="form-control" placeholder="Enter contact number">
</div>

<div class="mb-3">
<label class="form-label"><i class="fa-solid fa-notes-medical icon"></i>Emergency Details</label>
<textarea name="description" class="form-control" rows="3" placeholder="Describe the emergency"></textarea>
</div>

<div class="d-grid mt-4">
<button class="btn btn-danger">
<i class="fa-solid fa-paper-plane"></i> Submit Alert
</button>
</div>

</form>

</div>

<div class="card-footer text-center">
<small>Urgent alerts help connect donors and save lives ❤️</small>
</div>

</div>

</div>

</div>

</div>

</body>
</html>
