{% load static %}

<html>
<head>
<script>
    function checkpassword()
    {
        if(document.signup.pwd.value!=document.signup.cpwd.value)
        {
            alert('password and confirm password field does not same');
            document.signup.cpwd.focus();
            return false;
        }
        return true;
    }


</script>
</head>
<body>
{% include 'navigation.html' %}
<hr class="mt=0"> 

<div class="card shadow m-5" id="signupform">
    <div class="card-body">
        <h5 class="p-2" style="border-bottom: 2px solid orange;">Create an account(Volunteer)</h5> 
            <div class="container-fluid">
                <form method="post" enctype="multipart/form-data" name="signup" onsubmit="return checkpassword()">
                    {% csrf_token %}
                    <div class="form-row">
                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>FirstName</label>
                                <input type="text" name="firstname" class="form-control" placeholder="Enter First Name" required pattern="[A-Za-z]+">

                            </div>
                        </div>

                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>LastName</label>
                                <input type="text" name="lastname" class="form-control" placeholder="Enter Last Name" required pattern="[A-Za-z]+">

                            </div>
                        </div>

                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>Email Id</label>
                                <input type="email" name="email" class="form-control" placeholder="Enter Email Address" required >


                            </div>
                        </div>

                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>Contact</label>
                                <input type="text" name="contact" class="form-control" placeholder="Enter Contact Number" required >

                            </div>
                        </div>

                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" name="pwd" class="form-control" placeholder="Enter password " required >

                            </div>
                        </div>

                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>Confirm Password</label>
                                <input type="password" name="cpwd" class="form-control" placeholder="Enter password again " required >

                            </div>
                        </div>

                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>User Pic</label>
                                <input type="file" name="userpic" class="form-control"required >

                            </div>
                        </div>

                        <div class="col-sm-6">
                            <div class="form-group">
                                <label>ID Proof Pic(Aadthar ID , Voter ID etc.)</label>
                                <input type="file" name="idpic" class="form-control"required >

                            </div>
                        </div>

                        <div class="col-sm-12">
                            <div class="form-group">
                                <label>Address</label>
                                <textarea name="address" class="form-control" placeholder="Enter full Address " required ></textarea>

                            </div>
                        </div>

                        <div class="col-sm-12">
                            <div class="form-group">
                                <label>About YourSelf</label>
                                <textarea name="aboutme" class="form-control" placeholder="About YourSelf " required ></textarea>

                            </div>
                        </div>

                  </div>
                    <input type="submit" value="submit" class="m-2 px-3 btn btn-primary">
                </form>
            </div>
    </div>
</div>

{% if messages %}
  {% for message in messages %}
    <div class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}" role="alert">
      {{ message }}
    </div>
  {% endfor %}
{% endif %}

</body>
</html>
