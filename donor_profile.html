{% extends 'donor_base.html' %}

{% block main %}
<div class="container">
    <h1 class="text-white">Welcome, {{ request.user.username }}</h1>
    <p class="text-light">This is your donor dashboard.</p>
</div>

<div class="card shadow m-2">
    <div class="card-body">
        <h5 class="p-2" style="border-bottom: 2px solid orange;">
            Donor Profile
        </h5>

        <div class="container-fluid">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-row">

                    <!-- First Name -->
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" name="firstname" class="form-control"
                                   value="{{ donor.user.first_name }}" required>
                        </div>
                    </div>

                    <!-- Last Name -->
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" name="lastname" class="form-control"
                                   value="{{ donor.user.last_name }}" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control"
                                   value="{{ donor.user.email }}" required readonly>
                        </div>
                    </div>

                    <!-- Contact -->
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label>Contact</label>
                            <input type="text" name="contact" class="form-control"
                                   value="{{ donor.contact }}" required>
                        </div>
                    </div>

                    <!-- User Picture -->
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label>User Picture</label>
                            <input type="file" name="userpic" class="form-control">
                            {% if donor.userpic %}
                                <img src="{{ donor.userpic.url }}" width="50" class="mt-2">
                            {% endif %}
                        </div>
                    </div>

                    <!-- ID Proof -->
                    <!-- <div class="col-sm-6">
                        <div class="form-group">
                            <label>ID Proof</label>
                            <input type="file" name="idpic" class="form-control">
                            {% if donor.idpic %}
                                <img src="{{ donor.idpic.url }}" width="60" class="mt-2">
                            {% endif %}
                        </div>
                    </div> -->

                    <!-- Address -->
                    <div class="col-sm-12">
                        <div class="form-group">
                            <label>Address</label>
                            <textarea name="address" class="form-control" required>{{ donor.address }}</textarea>
                        </div>
                    </div>

                    <!-- About -->
                    <!-- <div class="col-sm-12">
                        <div class="form-group">
                            <label>About Yourself</label>
                            <textarea name="aboutme" class="form-control" required>{{ donor.aboutme }}</textarea>
                        </div>
                    </div> -->

                </div>

                <input type="submit" value="Update Profile" class="m-2 px-4 btn btn-primary">
            </form>
        </div>
    </div>
</div>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
{% endif %}

{% endblock %}
