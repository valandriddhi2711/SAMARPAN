<!DOCTYPE html>
<html>
<head>
<title>Kidney Patient Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

/* Header */
.header{
    background:#2f6f5e;
    color:white;
    text-align:center;
    padding:25px;
    font-size:28px;
    font-weight:bold;
}

/* Card */
.form-card{
    margin-top:60px;
    border-radius:20px;
    box-shadow:0px 6px 20px rgba(0,0,0,0.15);
}

.card-header{
    background:#2f6f5e;
    color:white;
    text-align:center;
    font-size:22px;
    border-radius:20px 20px 0 0;
}

.btn-register{
    background:#2f6f5e;
    border:none;
    width:100%;
    font-size:18px;
}

.btn-register:hover{
    background:#245747;
}

</style>

</head>

<body>

<div class="header">
Kidney Patient Registration
</div>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-6">

<div class="card form-card">

<div class="card-header">
Register as Kidney Patient
</div>

<div class="card-body">

<form method="POST">
{% csrf_token %}

<!-- Select User -->

<div class="mb-3">
<label class="form-label">Select User</label>

<select name="user" class="form-select" required>
<option value="">Select User</option>

{% for u in users %}
<option value="{{u.id}}">
{{u.username}}
</option>
{% endfor %}

</select>
</div>

<!-- Name -->

<div class="mb-3">
<label class="form-label">Patient Name</label>
<input type="text" name="name" class="form-control" placeholder="Enter Name" required>
</div>

<!-- Age -->

<div class="mb-3">
<label class="form-label">Age</label>
<input type="number" name="age" class="form-control" placeholder="Enter Age" required>
</div>

<!-- Blood Group -->

<div class="mb-3">
<label class="form-label">Blood Group</label>
<select name="blood_group" class="form-select" required>

<option value="">Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>
</div>

<!-- Hospital -->

<div class="mb-3">
<label class="form-label">Hospital Name</label>
<input type="text" name="hospital" class="form-control" placeholder="Enter Hospital Name" required>
</div>

<!-- Doctor -->

<div class="mb-3">
<label class="form-label">Doctor Name</label>
<input type="text" name="doctor" class="form-control" placeholder="Enter Doctor Name">
</div>

<!-- Contact -->

<div class="mb-3">
<label class="form-label">Contact</label>
<input type="text" name="contact" class="form-control" placeholder="Enter Contact Number" required>
</div>

<!-- Address -->

<div class="mb-3">
<label class="form-label">Address</label>
<textarea name="address" class="form-control" rows="3" placeholder="Enter Address"></textarea>
</div>

<button type="submit" class="btn btn-register">
Register Patient
</button>

</form>

</div>
</div>

</div>
</div>
</div>

</body>
</html>
