{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Blood Donation Register | Samarpan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(to right, #c31432, #240b36);
        }

        .form-container{
            background:white;
            width:90%;
            max-width:800px;
            padding:40px;
            border-radius:15px;
            box-shadow:0 15px 40px rgba(0,0,0,0.3);
        }

        .form-container h2{
            text-align:center;
            margin-bottom:30px;
            color:#c31432;
        }

        .form-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        .form-group label{
            margin-bottom:6px;
            font-weight:500;
            font-size:14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea{
            padding:10px;
            border-radius:8px;
            border:1px solid #ccc;
            outline:none;
            transition:0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus{
            border-color:#c31432;
        }

        .submit-btn{
            text-align:center;
            margin-top:30px;
        }

        .submit-btn button{
            padding:12px 35px;
            background:#c31432;
            border:none;
            color:white;
            border-radius:30px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .submit-btn button:hover{
            background:#8e0e1a;
        }

        .back-link{
            text-align:center;
            margin-top:15px;
        }

        .back-link a{
            text-decoration:none;
            color:#c31432;
            font-weight:500;
        }

        .back-link a:hover{
            text-decoration:underline;
        }

    </style>
</head>
<body>

<div class="form-container">

    <h2>Blood Donation Registration</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-grid">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullname" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="text" name="mobile" required>
            </div>

            <div class="form-group">
                <label>Blood Group</label>
                <select name="blood_group" required>
                    <option value="">Select</option>
                    <option>A+</option>
                    <option>A-</option>
                    <option>B+</option>
                    <option>B-</option>
                    <option>O+</option>
                    <option>O-</option>
                    <option>AB+</option>
                    <option>AB-</option>
                </select>
            </div>

            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" required>
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" min="18" required>
            </div>

            <div class="form-group" style="grid-column:1/-1;">
                <label>Address</label>
                <textarea name="address" rows="3"></textarea>
            </div>

        </div>

        <div class="submit-btn">
            <button type="submit">Register Now</button>
        </div>

    </form>

    <div class="back-link">
        <a href="{% url 'home' %}">← Back to Home</a>
    </div>

</div>

</body>
</html>
