<!DOCTYPE html>
<html>
<head>
<title>Volunteer Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background: linear-gradient(135deg,#00b09b,#96c93d);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family: Arial, Helvetica, sans-serif;
}

.card{
border:none;
border-radius:15px;
}

.card-header{
background:#0d6efd;
border-radius:15px 15px 0 0;
}

.form-control{
border-radius:8px;
}

.btn-success{
border-radius:8px;
font-weight:600;
}

.icon{
margin-right:8px;
color:#0d6efd;
}

</style>

</head>

<body>

<div class="container">
<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow-lg">

<div class="card-header text-center text-white">
<h3><i class="fa-solid fa-hand-holding-heart"></i> Volunteer Registration</h3>
<p class="mb-0">Support Organ Donation Awareness</p>
</div>

<div class="card-body p-4">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">
<label class="form-label"><i class="fa-solid fa-phone icon"></i>Contact Number</label>
<input type="text" name="contact" class="form-control" placeholder="Enter your contact number" required>
</div>

<div class="mb-3">
<label class="form-label"><i class="fa-solid fa-location-dot icon"></i>Address</label>
<textarea name="address" class="form-control" rows="3" placeholder="Enter your address"></textarea>
</div>

<div class="mb-3">
<label class="form-label"><i class="fa-solid fa-user icon"></i>About Me</label>
<textarea name="aboutme" class="form-control" rows="3" placeholder="Write something about yourself"></textarea>
</div>

<div class="mb-3">
<label class="form-label"><i class="fa-solid fa-image icon"></i>Profile Photo</label>
<input type="file" name="userpic" class="form-control">
</div>

<div class="mb-3">
<label class="form-label"><i class="fa-solid fa-id-card icon"></i>ID Proof</label>
<input type="file" name="idpic" class="form-control">
</div>

<div class="d-grid mt-4">
<button type="submit" class="btn btn-success">
<i class="fa-solid fa-paper-plane"></i> Register as Volunteer
</button>
</div>

</form>

</div>

<div class="card-footer text-center">
<small>Be a hero. Help spread awareness about organ donation 💚</small>
</div>

</div>

</div>

</div>
</div>

</body>
</html>
