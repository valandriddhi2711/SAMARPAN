<!DOCTYPE html>
<html>
<head>
<title>Emergency Alerts</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f4f6f9;">

<div class="container mt-5">

<h2 class="text-center text-danger mb-4">
🚨 Emergency Organ Donation Alerts
</h2>

<div class="row">

{% for alert in alerts %}

<div class="col-md-6 mb-4">

<div class="card shadow border-danger">

<div class="card-body">

<h5 class="text-danger">{{alert.organ_needed}} Required</h5>

<p><strong>Patient:</strong> {{alert.patient_name}}</p>

<p><strong>Hospital:</strong> {{alert.hospital}}</p>

<p><strong>Location:</strong> {{alert.location}}</p>

<p>{{alert.description}}</p>

<p><strong>Contact:</strong> {{alert.contact_number}}</p>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
