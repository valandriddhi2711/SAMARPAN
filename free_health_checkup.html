<!DOCTYPE html>
<html>
<head>
<title>Free Health Checkup</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff4b8b,#6a5acd);
    margin:0;
    padding:0;
}

.container{
    width:420px;
    margin:80px auto;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

label{
    font-weight:bold;
    display:block;
    margin-top:10px;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
}

input:focus, select:focus{
    outline:none;
    border-color:#6a5acd;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#ff4b8b;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#e63e7c;
}

</style>
</head>

<body>

<div class="container">

<h2>Free Health Checkup</h2>

<form method="POST">
{% csrf_token %}

<label>Name</label>
<input type="text" name="name" placeholder="Enter your name">

<label>Email</label>
<input type="email" name="email" placeholder="Enter your email">

<label>Phone</label>
<input type="text" name="phone" placeholder="Enter phone number">

<label>Age</label>
<input type="number" name="age" placeholder="Enter your age">

<label>Select Checkup</label>
<select name="checkup_type">
<option>Full Body Checkup</option>
<option>Blood Test</option>
<option>Heart Checkup</option>
<option>Kidney Checkup</option>
<option>Liver Checkup</option>
<option>Diabetes Test</option>
<option>Eye Checkup</option>
<option>Dental Checkup</option>
</select>

<button type="submit">Book Free Checkup</button>

</form>

</div>

</body>
</html>
